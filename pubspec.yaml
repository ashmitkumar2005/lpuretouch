name: lpu_touch
description: "LPU Touch - Custom client for Lovely Professional University"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP client
  dio: ^5.4.0
  
  # Secure local storage for token
  flutter_secure_storage: ^10.0.0
  
  # AES-256-CBC encryption
  encrypt: ^5.0.3
  
  # State management
  provider: ^6.1.2
  
  # UUID generation (for DeviceId)
  uuid: ^4.3.3
  
  # Device info for DeviceId
  device_info_plus: ^10.1.0
  
  # Navigation
  go_router: ^13.2.0
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
  fonts:
    - family: Virgo
      fonts:
        - asset: assets/fonts/virgo.ttf
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/SF-Pro/SF-Pro-Display-Regular.otf
          weight: 400
        - asset: assets/fonts/SF-Pro/SF-Pro-Display-Medium.otf
          weight: 500
        - asset: assets/fonts/SF-Pro/SF-Pro-Display-Bold.otf
          weight: 700
